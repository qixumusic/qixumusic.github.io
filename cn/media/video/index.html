<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="">
	<meta name="author" content="徐起">
	<link rel="manifest" href="/manifest.json">
	<title>Video | 钢琴家徐起的个人网站</title>
    <link rel="icon" href="/res/img/favicon.ico">
	<link rel="stylesheet" href="/style.css">
</head>


<body>
	<header class="header" id="header">
  <input class="menu-btn" type="checkbox" id="menu-btn" />
  <a class="logo" href="/">Qi Xu</a>
  <div class="spacer"></div>
  <ul class="menu">
    <li><a href="/cn/about/">关于</a></li>
    <li><a href="/cn/writing/">写作</a></li>
    <li><a href="/cn/media/">影音</a></li>
    <li><a href="/cn/contact/">联系</a></li>
  </ul>
  <label class="menu-icon" for="menu-btn"><span class="navicon"></span></label>
</header>
	<div ng-app="app" ng-controller="main_controller">
    <link href="styles.css" rel="stylesheet">
    <div class="mdl-grid">
        <div id="playerContainer">
            <div id="player"></div>
        </div>
        <div id="humbnailsContainer"></div>
    </div>
    <div class="thumbnails-container mdl-grid mdl-grid--no-spacing mdl-shadow--2dp" ng-repeat="item in items">
        <header class="section__play-btn mdl-cell mdl-cell--3-col-desktop mdl-cell--2-col-tablet mdl-cell--4-col-phone mdl-color--teal-100 mdl-color-text--white">
            <i ng-click = "play_video(item)" class="material-icons">play_circle_filled</i>
            <img ng-src="{[{item.thumbnail}]}"></img>
        </header>
        <div class="mdl-card mdl-cell mdl-cell--9-col-desktop mdl-cell--6-col-tablet mdl-cell--4-col-phone">
            <div class="mdl-card__supporting-text card-title">
                <h4>{[{item.title}]}</h4>
            </div>
            <div class="mdl-card__supporting-text meta">
                <p>Upload date : {[{item.publishDate}]} | Duration : {[{item.duration}]}</p>
            </div>
        </div>
    </div>
</div>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.4/angular.min.js"></script>
<script src="scripts.js"></script>

	<footer>
  <div class="left">
    <ul>
      <li><a href="/">&copy; Qi Xu 2022</a></li>
      <li><a href="/cn/about/">中文版</a></li>
      <li><a href="/en/about/">English</a></li>
    </ul>
  </div>
  <div class="spacer">
  </div>
  <div class="right">
    <ul>
      <li><a href="/cn/logistics/">网站信息</a></li>
    </ul>
  </div>
</footer>
	<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register("/sw.js").then((registration) => {
      console.log(`Service worker successfully registered at ${registration.scope}`)
    })
  }
</script>
<script>
  (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
  (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
  m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
  })(window,document,'script','//www.google-analytics.com/analytics.js','ga');

  ga('create', 'UA-69802004-1', 'auto');
  ga('send', 'pageview');

</script>

</body>

</html>
