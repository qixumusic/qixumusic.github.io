<!-- Skin CSS file (styling of UI - buttons, caption, etc.)
     In the folder of skin CSS file there are also:
     - .png and .svg icons sprite,
     - preloader.gif (for browsers that do not support CSS animations) -->
<link rel="stylesheet" href="/res/css/photoswipe_default-skin.css">

<!-- Core JS file -->
<script src="/res/js/photoswipe.min.js"></script>

<!-- UI JS file -->
<script src="/res/js/photoswipe-ui-default.js"></script>

<script>
init();
function init(){
var x=new XMLHttpRequest();
x.open('GET','https://api.flickr.com/services/rest/?method=flickr.photosets.getPhotos&api_key=abfe5ec76ca88cce01bc2f1489340caf&format=json&user_id=131771443@N02&photoset_id=72157650795545620',true)
x.send();
x.onload=function(){
var x=eval(this.response);
};
};

function jsonFlickrApi(rsp){
	var photos=rsp.photoset.photo;
	photosLength=photos.length;
	for(var i=0;i<photos.length;i++){
		var x=document.createElement("div");
	x.className="mdl-card mdl-cell mdl-cell--4-col image-page";
	x.innerHTML='<a class="thumbnail"><img class="img-responsive" alt=""></a>';
	var img=x.querySelector("img");
	img.src=getUrl(photos[i],"m");

		img.onload=(function(x){return function(){
		if(counter==photosLength-1){addClickListener();}
		else{counter++;}};})(x);

	document.querySelector(".row").appendChild(x);
	}


};

function getUrl(info,quality){
	//https://www.flickr.com/services/api/misc.urls.html
	return "https://farm"+info.farm+".staticflickr.com/"+info.server+"/"+info.id+"_"+info.secret+"_"+quality+".jpg";
};
//These two (bad practice) global variables just toggle dimension check when all images finish loading.
var counter=0;
var photosLength;

function addClickListener(){
	var imgs=document.querySelector(".row").getElementsByTagName("img");
	var openPhotoSwipe = function() {
    var pswpElement = document.querySelectorAll('.pswp')[0];

	String.prototype.replaceAt=function(index, character) {
    return this.substr(0, index) + character + this.substr(index+character.length);
}
    // build items array
    var items = [];
	for(var i=0;i<imgs.length;i++){
	console.log(imgs[i].src);
		items.push({"src":imgs[i].src.replaceAt(imgs[i].src.indexOf(".jpg")-1,"b"),"w":imgs[i].width*4.26,"h":imgs[i].height*4.26});
	}

    // define options (if needed)
    var options = {
             // history & focus options are disabled on CodePen
        history: false,
        focus: false,

        showAnimationDuration: 0,
        hideAnimationDuration: 0

    };

    gallery = new PhotoSwipe( pswpElement, PhotoSwipeUI_Default, items, options);
	for(var i=0;i<imgs.length;i++){
		imgs[i].onclick=(function(i,gallery){return function(){

		gallery.init();
		gallery.goTo(i);

			addClickListener(imgs[i].parentNode);

		};})(i,gallery);

	}


};
openPhotoSwipe();


};
</script>

<!-- Root element of PhotoSwipe. Must have class pswp. -->
<div class="pswp" tabindex="-1" role="dialog" aria-hidden="true">

    <!-- Background of PhotoSwipe.
         It's a separate element as animating opacity is faster than rgba(). -->
    <div class="pswp__bg"></div>

    <!-- Slides wrapper with overflow:hidden. -->
    <div class="pswp__scroll-wrap">

        <!-- Container that holds slides.
            PhotoSwipe keeps only 3 of them in the DOM to save memory.
            Don't modify these 3 pswp__item elements, data is added later on. -->
        <div class="pswp__container">
            <div class="pswp__item"></div>
            <div class="pswp__item"></div>
            <div class="pswp__item"></div>
        </div>

        <!-- Default (PhotoSwipeUI_Default) interface on top of sliding area. Can be changed. -->
        <div class="pswp__ui pswp__ui--hidden">

            <div class="pswp__top-bar">

                <!--  Controls are self-explanatory. Order can be changed. -->

                <div class="pswp__counter"></div>

                <button class="pswp__button pswp__button--close" title="Close (Esc)"></button>

                <button class="pswp__button pswp__button--share" title="Share"></button>

                <button class="pswp__button pswp__button--fs" title="Toggle fullscreen"></button>

                <button class="pswp__button pswp__button--zoom" title="Zoom in/out"></button>

                <!-- Preloader demo http://codepen.io/dimsemenov/pen/yyBWoR -->
                <!-- element will get class pswp__preloader--active when preloader is running -->
                <div class="pswp__preloader">
                    <div class="pswp__preloader__icn">
                      <div class="pswp__preloader__cut">
                        <div class="pswp__preloader__donut"></div>
                      </div>
                    </div>
                </div>
            </div>

            <div class="pswp__share-modal pswp__share-modal--hidden pswp__single-tap">
                <div class="pswp__share-tooltip"></div>
            </div>

            <button class="pswp__button pswp__button--arrow--left" title="Previous (arrow left)">
            </button>

            <button class="pswp__button pswp__button--arrow--right" title="Next (arrow right)">
            </button>

            <div class="pswp__caption">
                <div class="pswp__caption__center"></div>
            </div>

        </div>

    </div>

</div>
