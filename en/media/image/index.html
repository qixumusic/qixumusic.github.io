<script>
    addClickListener()
    function addClickListener() {
        var imgs = document.querySelectorAll(".gallery-container img");
        var openPhotoSwipe = function () {
            var pswpElement = document.querySelectorAll('.pswp')[0];

            String.prototype.replaceAt = function (index, character) {
                return this.substr(0, index) + character + this.substr(index + character.length);
            }
            // build items array
            var items = [];
            for (var i = 0; i < imgs.length; i++) {
                items.push({ "src": imgs[i].getAttribute('data-src'), "w": imgs[i].getAttribute('data-width'), "h": imgs[i].getAttribute('data-height') });
            }

            // define options (if needed)
            var options = {
                // history & focus options are disabled on CodePen
                history: false,
                focus: false,

                showAnimationDuration: 0,
                hideAnimationDuration: 0

            };

            gallery = new PhotoSwipe(pswpElement, PhotoSwipeUI_Default, items, options);
            for (var i = 0; i < imgs.length; i++) {
                imgs[i].onclick = (function (i, gallery) {
                    return function () {

                        gallery.init();
                        gallery.goTo(i);

                        addClickListener(imgs[i].parentNode);

                    };
                })(i, gallery);

            }


        };
        openPhotoSwipe();


    };
</script>
